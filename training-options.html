<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Start Training | Mena Fitness</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">

<style>
:root{
--red:#8B0000;
--red-dark:#5a0000;
--gold:#D4AF37;
--gold-soft:#f0d57a;
--black:#111;
--white:#fff;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Montserrat',sans-serif;
}

html, body{
width:100%;
height:100%;
background:var(--black);
color:var(--white);
}

a{
text-decoration:none;
color:inherit;
}

.split-page{
width:100%;
min-height:100vh;
}

.half{
position:relative;
width:100%;
min-height:50vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
overflow:hidden;
padding:40px 20px;
}

.online{
background:
linear-gradient(rgba(0,0,0,.45), rgba(0,0,0,.7)),
url('https://images.unsplash.com/photo-1518611012118-fdd6baf2d4a6?auto=format&fit=crop&w=1600&q=80') center center / cover no-repeat;
}

.mobile{
background:
linear-gradient(rgba(0,0,0,.45), rgba(0,0,0,.7)),
url('https://images.unsplash.com/photo-1571019613454-1cb2f99b2d8b?auto=format&fit=crop&w=1600&q=80') center center / cover no-repeat;
}

.content{
max-width:700px;
}

.content h1{
font-size:2.5rem;
font-weight:900;
margin-bottom:12px;
text-shadow:0 8px 24px rgba(0,0,0,.35);
}

.content p{
font-size:1.05rem;
margin-bottom:24px;
color:rgba(255,255,255,.92);
}

.btn{
display:inline-block;
background:var(--gold);
color:#111;
padding:14px 26px;
border-radius:999px;
font-weight:800;
transition:.25s ease;
}

.btn:hover{
transform:translateY(-2px);
box-shadow:0 10px 24px rgba(0,0,0,.25);
}

.back-link{
position:fixed;
top:20px;
left:20px;
z-index:20;
background:rgba(0,0,0,.45);
color:#fff;
padding:10px 16px;
border-radius:999px;
font-weight:700;
border:1px solid rgba(255,255,255,.18);
backdrop-filter:blur(8px);
}

.back-link:hover{
background:rgba(212,175,55,.95);
color:#111;
}

@media(max-width:768px){
.content h1{
font-size:1.9rem;
}

.content p{
font-size:.98rem;
}

.btn{
padding:12px 22px;
}
}
</style>
</head>
<body>

<a href="index.html" class="back-link">← Back to Home</a>

<div class="split-page">
<section class="half online">
<div class="content">
<h1>Online Coaching</h1>
<p>Get a custom training plan, accountability, and expert support from anywhere.</p>
<a href="#" class="btn">Start Online Coaching</a>
</div>
</section>

<section class="half mobile">
<div class="content">
<h1>Mobile Training</h1>
<p>We bring the workout to your home, apartment gym, or local park.</p>
<a href="#" class="btn">Book Mobile Training</a>
</div>
</section>
</div>

</body>
</html>
